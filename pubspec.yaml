name: cinacleke
description: Cenacle Link - A Christian community app for connection, devotion, and discussion.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # Media
  youtube_player_flutter: ^9.1.3
  just_audio: ^0.9.36

  # Network
  url_launcher: ^6.3.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  image_picker: ^1.1.2
  firebase_storage: ^12.3.4

  # Utilities
  crypto: ^3.0.6
  timeago: ^3.7.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a5c1a"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
